name: MLOps Pipeline

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all steps'
        required: false
        default: true
      run_data_processing:
        description: 'Run data processing job'
        required: false
        default: false
      run_model_training:
        description: 'Run model training job'
        required: false
        default: false
      run_build_and_publish:
        description: 'Run docker build and publish job'
        required: false
        default: false
  release:
    types: [created]
    branches: [ main ]
    tags: [ v*.*.* ]
        

jobs:
  data-processing:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🛠️ Data Processing
        run: |
          python src/data/run_processing.py \
            --input data/raw/house_data.csv \
            --output data/processed/cleaned_house_data.csv

      - name: 🧪 Feature Engineering
        run: |
          python src/features/engineer.py \
            --input data/processed/cleaned_house_data.csv \
            --output data/processed/featured_house_data.csv \
            --preprocessor models/trained/preprocessor.pkl

      - name: 📤 Upload processed data
        uses: actions/upload-artifact@v6
        with:
          name: processed-data
          path: data/processed/featured_house_data.csv

      - name: 📤 Upload preprocessor
        uses: actions/upload-artifact@v6
        with:
          name: preprocessor
          path: models/trained/preprocessor.pkl

  model-training:
    needs: data-processing
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📥 Download processed data
        uses: actions/download-artifact@v6
        with:
          name: processed-data
          path: data/processed/

      - name: 🚀 Setup MLflow
        run: |
          docker pull ghcr.io/mlflow/mlflow:latest
          docker run -d -p 5555:5000 --name mlflow-server ghcr.io/mlflow/mlflow:latest mlflow server \
            --host 0.0.0.0 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root /tmp/mlruns
      
      - name: ⏳ Wait for MLflow to be ready
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health || sleep 5;
          done

      - name: 🏋️ Train the model
        run: |
          python src/models/train_model.py \
            --config configs/model_config.yaml \
            --data data/processed/featured_house_data.csv \
            --models-dir models \
            --mlflow-tracking-uri http://localhost:5555

      - name: 📤 Upload trained model
        uses: actions/upload-artifact@v6
        with:
          name: trained-model
          path: models/

      - name: 🧹 Cleanup MLflow
        run: |
          docker stop mlflow-server || true
          docker rm mlflow-server || true
          docker rmi ghcr.io/mlflow/mlflow:latest || true

  build-and-publish:
    needs: model-training
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📥 Download trained model
        uses: actions/download-artifact@v6
        with:
          name: trained-model
          path: models/

      - name: 📥 Download preprocessor
        uses: actions/download-artifact@v6
        with:
          name: preprocessor
          path: models/trained/

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🐳 Build and test Docker image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/api-house-price-model:$COMMIT_HASH .
          docker run -d -p 8000:8000 --name test-api ${{ vars.DOCKERHUB_USERNAME }}/api-house-price-model:$COMMIT_HASH
          for i in {1..10}; do
            curl -f http://localhost:8000/health && break || sleep 5;
          done
          docker logs test-api

      - name: 🧹 Cleanup Test Container
        run: |
          docker stop test-api || true
          docker rm test-api || true

      - name: 🐳 Push Docker image
        run: |
          COMMIT_HASH=$(echo ${{ github.sha }} | cut -c1-7)
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/api-house-price-model:$COMMIT_HASH ${{ vars.DOCKERHUB_USERNAME }}/api-house-price-model:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/api-house-price-model:$COMMIT_HASH
          docker push ${{ vars.DOCKERHUB_USERNAME }}/api-house-price-model:latest
